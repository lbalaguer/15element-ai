<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>¡Listo! Tu sesión quedó agendada — 15Element</title>
<meta name="description" content="Tu sesión de discovery quedó agendada. Te llega la confirmación por correo con el link de la llamada.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://15element.ai/gracias-auditoria/">

<link rel="icon" type="image/png" href="{{ASSETS}}/logo-mark-color.png">
<link rel="apple-touch-icon" href="{{ASSETS}}/logo-mark-color.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="{{COLORS_CSS}}">
<link rel="stylesheet" href="{{COMMON_CSS}}">
<link rel="stylesheet" href="{{PAGE_CSS}}">
</head>
<body>
<!-- @include nav -->

<main class="gd-wrap">
  <div class="gd-card">
    <div class="check">✅</div>
    <h1>Tu sesión quedó agendada</h1>
    <p>Te acaba de llegar la confirmación por correo con el link de la llamada. Son 60 minutos, contigo y con tu operación en la mesa — no es un script de calificación.</p>
    <p>Si necesitas mover el horario, en ese mismo correo viene el link para reagendar.</p>
    <a class="btn btn-primary" href="/casos/">Ver casos reales →</a>
  </div>
</main>

<script>
// Meta: conversión "sesión de auditoría agendada" — el calendario Discovery/Review
// (GHL) redirige aquí al confirmar. Pixel base via GTM (diferido) → retry-loop.
// content_name separa este funnel (enterprise-audit) del de agencias en Meta.
(function(){
  var n = 0, t = setInterval(function(){
    if (window.fbq) { try { fbq('track', 'Schedule', { content_name: 'enterprise-audit' }); } catch(e){} clearInterval(t); }
    else if (++n > 40) { clearInterval(t); }
  }, 500);
})();
</script>

<!-- @include footer -->
<!-- @include theme-script -->
</body>
</html>
