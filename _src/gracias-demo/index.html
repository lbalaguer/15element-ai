<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>¡Listo! Tu demo quedó agendada — 15Element</title>
<meta name="description" content="Tu demo quedó agendada. Te llega la confirmación por correo con el link de la llamada.">
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://15element.ai/gracias-demo/">

<link rel="icon" type="image/png" href="{{ASSETS}}/logo-mark-color.png">
<link rel="apple-touch-icon" href="{{ASSETS}}/logo-mark-color.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="{{COMMON_CSS}}">

</head>
<body>
<!-- @include nav -->

<main class="gd-wrap">
  <div class="gd-card">
    <div class="check">✅</div>
    <h1>Tu demo quedó agendada</h1>
    <p>Te acaba de llegar la confirmación por correo con el link de la llamada. Si necesitas mover el horario, en ese mismo correo viene el link para reagendar.</p>
    <p>Mientras llega el día, échale un ojo a resultados reales de la plataforma:</p>
    <a class="btn btn-primary" href="/casos/">Ver casos reales →</a>
  </div>
</main>

<script>
// Meta: conversión "demo agendada" — el calendario (GHL) redirige aquí al confirmar.
// El pixel base lo trae GTM (diferido a interacción o 5s) → se reintenta hasta que
// fbq exista; en una thank-you el usuario se queda lo suficiente para que aterrice.
(function(){
  var n = 0, t = setInterval(function(){
    if (window.fbq) { try { fbq('track', 'Schedule'); } catch(e){} clearInterval(t); }
    else if (++n > 40) { clearInterval(t); }
  }, 500);
})();
</script>

</body>
</html>
