<!-- Video testimonials lightbox — overlay + JS. El iframe de YouTube se inyecta
     SOLO al hacer clic (cero impacto en LCP). Se incluye en páginas con .video-testimonials -->
<div class="vt-lightbox" id="vtLightbox" aria-hidden="true">
  <div class="vt-lightbox-inner">
    <button class="vt-close" type="button" aria-label="Cerrar video">&times;</button>
    <div class="vt-frame"></div>
  </div>
</div>
<script>
(function () {
  var box = document.getElementById('vtLightbox');
  if (!box) return;
  var frame = box.querySelector('.vt-frame');
  function openVideo(id) {
    frame.innerHTML = '<iframe src="https://www.youtube.com/embed/' + id +
      '?autoplay=1&rel=0" title="Testimonial 15Element" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen></iframe>';
    box.classList.add('is-open');
    box.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function closeVideo() {
    box.classList.remove('is-open');
    box.setAttribute('aria-hidden', 'true');
    frame.innerHTML = '';
    document.body.style.overflow = '';
  }
  document.addEventListener('click', function (e) {
    var card = e.target.closest('.vt-card[data-yt]');
    if (card) { e.preventDefault(); openVideo(card.getAttribute('data-yt')); return; }
    if (e.target === box || e.target.closest('.vt-close')) closeVideo();
  });
  document.addEventListener('keydown', function (e) { if (e.key === 'Escape') closeVideo(); });
})();
</script>
