<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.badges { display: flex; flex-wrap: wrap; gap: 8px; }
.b {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 999px;
  letter-spacing: 0.02em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.b .dot { width: 6px; height: 6px; border-radius: 50%; }
.b-teal { background: rgba(32,148,153,0.12); color: #1A7B80; }
.b-green { background: rgba(126,183,73,0.16); color: #6FA13E; }
.b-orange { background: rgba(237,147,33,0.16); color: #D17E15; }
.b-red { background: rgba(189,36,41,0.12); color: #BD2429; }
.b-navy { background: var(--brand-navy); color: white; }
.b-outline { background: transparent; border: 1px solid var(--border-strong); color: var(--fg-muted); }
.b-mono { font-family: var(--font-mono); padding: 4px 8px; border-radius: 6px; background: var(--ink-50); color: var(--fg); font-weight: 500; }
</style></head><body>
<div class="card">
  <div class="badges">
    <span class="b b-teal"><span class="dot" style="background:#209499"></span>Active</span>
    <span class="b b-green"><span class="dot" style="background:#7EB749"></span>Healthy</span>
    <span class="b b-orange"><span class="dot" style="background:#ED9321"></span>Degraded</span>
    <span class="b b-red"><span class="dot" style="background:#BD2429"></span>Failed</span>
    <span class="b b-navy">Beta</span>
    <span class="b b-outline">Draft</span>
    <span class="b b-mono">v2.1.4</span>
    <span class="b b-mono">04ms p50</span>
  </div>
</div></body></html>
