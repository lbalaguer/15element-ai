<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.btn {
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 600;
  line-height: 1;
  padding: 12px 20px;
  border-radius: 10px;
  border: 1px solid transparent;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all 120ms cubic-bezier(0.2,0,0,1);
}
.btn-primary { background: var(--brand-teal); color: white; }
.btn-primary:hover { background: var(--brand-teal-600); }
.btn-secondary { background: var(--brand-navy); color: white; }
.btn-ghost { background: transparent; color: var(--brand-navy); border-color: var(--border-strong); }
.btn-danger { background: var(--brand-red); color: white; }
.btn-text { background: transparent; color: var(--brand-teal); padding: 12px 8px; }
.btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 8px; }
.btn-lg { padding: 16px 28px; font-size: 16px; }
.btn-disabled { background: var(--ink-100); color: var(--ink-400); cursor: not-allowed; }
.row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.arrow { width: 14px; height: 14px; }
</style></head><body>
<div class="card">
  <div class="row">
    <button class="btn btn-primary">Start building <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
    <button class="btn btn-secondary">Documentation</button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-danger">Delete element</button>
    <button class="btn btn-text">Learn more →</button>
  </div>
  <div class="row">
    <button class="btn btn-primary btn-sm">Save</button>
    <button class="btn btn-primary">Save</button>
    <button class="btn btn-primary btn-lg">Save</button>
    <button class="btn btn-disabled">Disabled</button>
  </div>
</div></body></html>
