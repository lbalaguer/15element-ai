<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.sp-row { display: flex; align-items: center; gap: 14px; }
.bar { background: linear-gradient(90deg, #209499, #209499); height: 16px; border-radius: 3px; }
.tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 84px; }
.val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); margin-left: auto; }
</style></head><body>
<div class="card">
  <div class="sp-row"><span class="tok">--sp-1</span><div class="bar" style="width:4px"></div><span class="val">4 px</span></div>
  <div class="sp-row"><span class="tok">--sp-2</span><div class="bar" style="width:8px"></div><span class="val">8 px</span></div>
  <div class="sp-row"><span class="tok">--sp-3</span><div class="bar" style="width:12px"></div><span class="val">12 px</span></div>
  <div class="sp-row"><span class="tok">--sp-4</span><div class="bar" style="width:16px"></div><span class="val">16 px</span></div>
  <div class="sp-row"><span class="tok">--sp-6</span><div class="bar" style="width:24px"></div><span class="val">24 px</span></div>
  <div class="sp-row"><span class="tok">--sp-8</span><div class="bar" style="width:32px"></div><span class="val">32 px</span></div>
  <div class="sp-row"><span class="tok">--sp-12</span><div class="bar" style="width:48px"></div><span class="val">48 px</span></div>
  <div class="sp-row"><span class="tok">--sp-16</span><div class="bar" style="width:64px"></div><span class="val">64 px</span></div>
  <div class="sp-row"><span class="tok">--sp-24</span><div class="bar" style="width:96px"></div><span class="val">96 px</span></div>
</div></body></html>
