<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.scale-row { display: flex; align-items: baseline; gap: 16px; padding: 6px 0; border-bottom: 1px solid var(--border); }
.scale-row:last-child { border-bottom: 0; }
.scale-row .token { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 90px; }
.scale-row .size { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); width: 60px; text-align: right; }
.scale-row .specimen { font-family: var(--font-display); text-transform: uppercase; letter-spacing: -0.02em; color: var(--brand-navy); font-weight: 700; flex: 1; line-height: 1; }
</style></head><body>
<div class="card">
  <div class="scale-row"><span class="token">display-xl</span><span class="specimen" style="font-size:56px; font-weight:800">Build</span><span class="size">56 / 112</span></div>
  <div class="scale-row"><span class="token">display-lg</span><span class="specimen" style="font-size:44px; font-weight:800">Build</span><span class="size">44 / 80</span></div>
  <div class="scale-row"><span class="token">display-md</span><span class="specimen" style="font-size:32px">Build</span><span class="size">32 / 56</span></div>
  <div class="scale-row"><span class="token">h1</span><span class="specimen" style="font-size:28px">Section heading</span><span class="size">28</span></div>
  <div class="scale-row"><span class="token">h2</span><span class="specimen" style="font-size:22px">Subsection</span><span class="size">22</span></div>
  <div class="scale-row"><span class="token">h3</span><span class="specimen" style="font-size:18px; text-transform:none; font-family:var(--font-body); font-weight:600; letter-spacing:-0.01em">Body heading</span><span class="size">18</span></div>
</div></body></html>
