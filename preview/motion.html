<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
.curve { background: var(--brand-navy); color: white; padding: 12px 16px; border-radius: 10px; font-family: var(--font-mono); font-size: 11px; line-height: 1.4; }
.dur { display: inline-flex; gap: 6px; padding: 8px 14px; background: var(--ink-100); border-radius: 999px; font-family: var(--font-mono); font-size: 12px; color: var(--brand-navy); }
.tick { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--brand-teal); }
</style></head><body>
<div class="card">
  <div class="row">
    <div class="dur"><span class="tick"></span>fast · 120ms</div>
    <div class="dur"><span class="tick" style="background:#7EB749"></span>base · 200ms</div>
    <div class="dur"><span class="tick" style="background:#ED9321"></span>slow · 320ms</div>
  </div>
  <div class="row">
    <div class="curve">--ease-standard<br><span style="opacity:.6">cubic-bezier(0.2, 0, 0, 1)</span></div>
    <div class="curve">--ease-emphasized<br><span style="opacity:.6">cubic-bezier(0.16, 1, 0.3, 1)</span></div>
  </div>
</div></body></html>
