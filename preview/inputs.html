<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.fld { display: flex; flex-direction: column; gap: 6px; }
.lbl { font-family: var(--font-body); font-size: 12px; font-weight: 600; color: var(--brand-navy); letter-spacing: 0.02em; }
.ipt {
  font-family: var(--font-body);
  font-size: 14px;
  padding: 11px 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--brand-navy);
  outline: none;
  transition: all 120ms;
}
.ipt:focus { border-color: var(--brand-teal); box-shadow: 0 0 0 3px rgba(32,148,153,0.25); }
.ipt-focus { border-color: var(--brand-teal); box-shadow: 0 0 0 3px rgba(32,148,153,0.25); }
.ipt-err { border-color: var(--brand-red); box-shadow: 0 0 0 3px rgba(189,36,41,0.18); }
.help { font-size: 11px; color: var(--fg-muted); }
.err { font-size: 11px; color: var(--brand-red); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.sel { appearance: none; background-image: linear-gradient(45deg, transparent 50%, currentColor 50%), linear-gradient(135deg, currentColor 50%, transparent 50%); background-position: calc(100% - 18px) 18px, calc(100% - 13px) 18px; background-size: 5px 5px; background-repeat: no-repeat; padding-right: 32px; color: var(--brand-navy); }
</style></head><body>
<div class="card">
  <div class="grid">
    <div class="fld"><label class="lbl">Element name</label><input class="ipt" value="api.classifier"><div class="help">Lowercase, hyphenated, no spaces.</div></div>
    <div class="fld"><label class="lbl">Region</label><select class="ipt sel"><option>us-west-2</option></select></div>
    <div class="fld"><label class="lbl">API key</label><input class="ipt ipt-focus" placeholder="sk-15e-..."></div>
    <div class="fld"><label class="lbl">Webhook URL</label><input class="ipt ipt-err" value="not-a-url"><div class="err">Must be a valid https:// URL.</div></div>
  </div>
</div></body></html>
