<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.scale { display: grid; grid-template-columns: repeat(9, 1fr); gap: 4px; }
.step { aspect-ratio: 1 / 1.4; border-radius: 6px; position: relative; border: 1px solid var(--border); }
.step .n { font-family: var(--font-mono); font-size: 10px; position: absolute; bottom: 4px; left: 6px; color: white; mix-blend-mode: difference; opacity: 0.85; }
.label { font-size: 11px; font-family: var(--font-mono); color: var(--fg-muted); margin-bottom: -8px; }
</style></head><body>
<div class="card">
  <div class="label">ink — neutral scale</div>
  <div class="scale">
    <div class="step" style="background:#FFFFFF"><span class="n" style="color:#2A2E46">0</span></div>
    <div class="step" style="background:#F6F7F9"><span class="n" style="color:#2A2E46">50</span></div>
    <div class="step" style="background:#EBEDF1"><span class="n" style="color:#2A2E46">100</span></div>
    <div class="step" style="background:#D8DBE3"><span class="n" style="color:#2A2E46">200</span></div>
    <div class="step" style="background:#BDBEC0"><span class="n" style="color:#2A2E46">300</span></div>
    <div class="step" style="background:#8C90A1"><span class="n">400</span></div>
    <div class="step" style="background:#5E6378"><span class="n">500</span></div>
    <div class="step" style="background:#404560"><span class="n">600</span></div>
    <div class="step" style="background:#2A2E46"><span class="n">700</span></div>
  </div>
</div></body></html>
