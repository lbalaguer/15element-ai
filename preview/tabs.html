<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.seg { display: inline-flex; background: var(--ink-100); border-radius: 999px; padding: 4px; }
.seg button { border: 0; background: transparent; padding: 7px 16px; border-radius: 999px; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--fg-muted); cursor: pointer; }
.seg button.active { background: white; color: var(--brand-navy); font-weight: 600; box-shadow: 0 1px 2px rgba(20,22,42,0.08); }
.tabs { display: flex; gap: 24px; border-bottom: 1px solid var(--border); }
.tabs button { background: transparent; border: 0; padding: 12px 0; font-family: var(--font-body); font-size: 14px; color: var(--fg-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tabs button.active { color: var(--brand-navy); border-bottom-color: var(--brand-teal); font-weight: 600; }
</style></head><body>
<div class="card">
  <div><div class="seg"><button class="active">Overview</button><button>Logs</button><button>Metrics</button><button>Settings</button></div></div>
  <div class="tabs"><button>Inputs</button><button class="active">Inference</button><button>Outputs</button><button>Observability</button></div>
</div></body></html>
