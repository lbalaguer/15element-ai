<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.marks { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.mark {
  aspect-ratio: 1 / 1;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.mark.dark { background: var(--brand-navy); border-color: var(--brand-navy); }
.mark img { width: 70%; height: 70%; object-fit: contain; }
.captions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.cap-row { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); text-align: center; }
</style></head><body>
<div class="card">
  <div class="marks">
    <div class="mark"><img src="../assets/logo-mark-color.png?v=2" alt=""></div>
    <div class="mark"><img src="../assets/logo-mark-navy.png?v=2" alt=""></div>
    <div class="mark dark"><img src="../assets/logo-mark-white-on-navy.png?v=2" alt=""></div>
    <div class="mark dark"><img src="../assets/logo-mark-color.png?v=2" alt=""></div>
  </div>
  <div class="captions">
    <div class="cap-row">primary · color</div>
    <div class="cap-row">monotone · navy</div>
    <div class="cap-row">reversed · white</div>
    <div class="cap-row">color · on dark</div>
  </div>
</div></body></html>
