<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.lockup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.lockup {
  height: 110px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.lockup.dark { background: var(--brand-navy); border-color: var(--brand-navy); }
.lockup img { max-height: 70%; max-width: 80%; object-fit: contain; }
.label {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--fg-subtle);
  position: absolute;
  margin-top: 88px;
  padding-left: 10px;
}
</style></head><body>
<div class="card">
  <div class="lockup-grid">
    <div class="lockup"><img src="../assets/logo-horizontal-color.png" alt=""></div>
    <div class="lockup dark"><img src="../assets/logo-horizontal-color-on-navy.png" alt=""></div>
    <div class="lockup"><img src="../assets/logo-horizontal-navy.png" alt=""></div>
    <div class="lockup dark"><img src="../assets/logo-horizontal-white-on-navy.png" alt=""></div>
  </div>
</div></body></html>
