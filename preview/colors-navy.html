<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.navy-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.swatch { border-radius: var(--r-md); overflow: hidden; border: 1px solid var(--border); }
.chip { height: 96px; }
.meta { padding: 10px 12px; background: white; }
.meta .name { font-size: 12px; font-weight: 600; color: var(--fg); margin-bottom: 2px; }
.meta .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-muted); }
.meta .role { font-size: 11px; color: var(--fg-subtle); margin-top: 2px; }
</style></head><body>
<div class="card">
  <div class="navy-row">
    <div class="swatch">
      <div class="chip" style="background:#1F2236"></div>
      <div class="meta"><div class="name">Navy Deep</div><div class="hex">#1F2236</div><div class="role">Dark surface</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#2A2E46"></div>
      <div class="meta"><div class="name">Brand Navy</div><div class="hex">#2A2E46</div><div class="role">Ink / primary text</div></div>
    </div>
    <div class="swatch">
      <div class="chip" style="background:#353A56"></div>
      <div class="meta"><div class="name">Navy Soft</div><div class="hex">#353A56</div><div class="role">Hover / elevated dark</div></div>
    </div>
  </div>
</div></body></html>
